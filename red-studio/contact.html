<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | RED Studio</title>
    <link rel="icon" type="image/png" href="assets/ACT.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <meta property="og:title" content="RED Studio | Cinematic Visuals">
    <meta property="og:description" content="We Paint with Light. Premium photography and videography studio.">
    <meta property="og:image" content="assets/Banner.png">
    <meta property="og:url" content="https://redstudio.com">
    <meta property="og:type" content="website">
</head>

<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo-box"><img src="assets/ACT.png" alt="RED Studio" loading="lazy"></a>
            <button class="hamburger" aria-label="Menu">&#9776;</button>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="team.html">Our Team</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="studio.html">Studio</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero"
        style="min-height: 50vh; padding-top: 150px; background: linear-gradient(135deg, #110000 0%, #0A0000 100%);">
        <div class="container text-center fade-in">
            <h1 class="hero-title">Let's Create <span class="text-accent">Something RED</span></h1>
            <p class="subtitle mt-4">We are available for booking from our studios in Karnataka.</p>
        </div>
    </section>

    <!-- Main Contact Area -->
    <section class="container fade-in" style="padding-top: 0;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 4rem;">

            <!-- Form -->
            <div class="card">
                <h2
                    style="margin-bottom: 2rem; font-family: 'Outfit'; border-left: 4px solid var(--accent-red); padding-left: 15px;">
                    Book a Session</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <input type="text" name="name" class="form-control" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" name="phone" class="form-control" placeholder="Phone Number" required>
                    </div>
                    <div class="form-group">
                        <select name="service" class="form-control" style="appearance: auto;" required>
                            <option value="" disabled selected>Select Service...</option>
                            <option value="Photography">Photography</option>
                            <option value="Videography">Videography</option>
                            <option value="Reels">Reels & Shorts</option>
                            <option value="Web Development">Web Development</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="date" name="date" class="form-control" title="Preferred Date">
                    </div>
                    <div class="form-group">
                        <textarea name="message" class="form-control"
                            placeholder="Tell us about your project..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Request</button>
                </form>
            </div>

            <!-- Info & Map -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <!-- Info block -->
                <div class="card" style="padding: 2rem;">
                    <h3 style="margin-bottom: 1.5rem; color: var(--accent-red);">Direct Contact</h3>
                    <p style="margin-bottom: 1rem;"><i class="fas fa-envelope text-accent" style="width: 25px;"></i>
                        ddxredx0703@gmail.com</p>
                    <p style="margin-bottom: 1rem;"><i class="fas fa-phone text-accent" style="width: 25px;"></i> +91
                        76762 18729</p>
                </div>

                <!-- Banner -->
                <div style="flex-grow: 1; display: flex; align-items: stretch;">
                    <img src="assets/redpatterns.png" alt="RED Studio Banner"
                        style="width: 100%; object-fit: cover; border-radius: 12px; border: 1px solid rgba(227,6,19,0.3); min-height: 250px;">
                </div>
            </div>

        </div>
    </section>

    <!-- Footer placeholder -->
    <footer
        style="margin-top: 3rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding: 2rem 0;">
        <img src="assets/ACT.png" alt="RED Logomark" style="height:30px; margin-bottom:1rem;" loading="lazy">
        <p class="text-muted">&copy; 2026 RED Studio</p>
    </footer>

    <script src="js/main.js"></script>

    <a href="contact.html" class="mobile-book-now">
        <i class="fas fa-calendar-check"></i> Book Now
    </a>

</body>

</html>
